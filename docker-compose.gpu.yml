# =============================================================================
# GPU Override for Smart Parking System
# =============================================================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# =============================================================================

services:
  parking:
    build:
      target: runtime-gpu
    environment:
      # Enable GPU optimizations
      PARKING_USE_HALF_PRECISION: "True"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
